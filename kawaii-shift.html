<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>可愛いシフトカレンダー</title>
  
  <link rel="apple-touch-icon" href="https://i.ibb.co/d0ZyHs2K/1777342359953.jpg">
  <link rel="icon" href="https://i.ibb.co/d0ZyHs2K/1777342359953.jpg">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Zen Maru Gothic', sans-serif; margin: 0; padding: 0; background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; overscroll-behavior-y: none; }
    .app-container { width: 100%; max-width: 380px; height: 100vh; overflow: hidden; position: relative; display: flex; flex-direction: column; transition: background-color 0.5s ease; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
    @media (min-width: 640px) { .app-container { height: 800px; border-radius: 40px; } }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .bounce-in { animation: bounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes bounce { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .active-scale:active { transform: scale(0.9); }
    .stamp-btn { transition: all 0.3s ease; }
    .stamp-btn.selected { transform: scale(1.1); }
    .stamp-btn:not(.selected) { opacity: 0.7; }
    .theme-dot { transition: all 0.3s ease; }
    .theme-dot.selected { border-color: white; transform: scale(1.25); }
    .theme-dot:not(.selected) { opacity: 0.5; border-color: transparent; }
  </style>

  <script>
    const themes = {
      pink: { bg: 'bg-pink-50', header: 'bg-pink-200 text-pink-800', card: 'bg-white', text: 'text-pink-800', muted: 'text-pink-400', border: 'border-pink-100', dot: 'bg-pink-400', activeBg: 'bg-pink-100', todayRing: 'ring-2 ring-pink-300 ring-offset-1' },
      blue: { bg: 'bg-sky-50', header: 'bg-sky-200 text-sky-800', card: 'bg-white', text: 'text-sky-800', muted: 'text-sky-400', border: 'border-sky-100', dot: 'bg-sky-400', activeBg: 'bg-sky-100', todayRing: 'ring-2 ring-sky-300 ring-offset-1' },
      yellow: { bg: 'bg-amber-50', header: 'bg-amber-200 text-amber-900', card: 'bg-white', text: 'text-amber-900', muted: 'text-amber-500', border: 'border-amber-100', dot: 'bg-amber-400', activeBg: 'bg-amber-100', todayRing: 'ring-2 ring-amber-300 ring-offset-1' }
    };

    const shiftTypes = [
      { id: 'early1', category: 'early', label: '早番①', shortLabel: '早', time: '6:30〜15:15', icon: 'sunrise', badge: '①', color: 'text-orange-500', bg: 'bg-orange-100' },
      { id: 'early2', category: 'early', label: '早番②', shortLabel: '早', time: '7:00〜15:45', icon: 'sun', badge: '②', color: 'text-orange-500', bg: 'bg-orange-100' },
      { id: 'early3', category: 'early', label: '早番③', shortLabel: '早', time: '7:00〜15:45', icon: 'sun', badge: '③', color: 'text-amber-500', bg: 'bg-amber-100' },
      { id: 'early_over', category: 'early', label: '早超勤', shortLabel: '早超', time: '7:00〜17:00', icon: 'cloud-sun', color: 'text-orange-400', bg: 'bg-orange-50' },
      { id: 'day', category: 'early', label: '日勤', shortLabel: '日勤', time: '8:30～17:15', icon: 'coffee', color: 'text-emerald-500', bg: 'bg-emerald-100' },
      { id: 'late1', category: 'late', label: '遅番①', shortLabel: '遅', time: '12:00〜20:45', icon: 'sunset', badge: '①', color: 'text-indigo-500', bg: 'bg-indigo-100' },
      { id: 'late2', category: 'late', label: '遅番②', shortLabel: '遅', time: '10:45〜20:45', icon: 'sunset', badge: '②', color: 'text-violet-500', bg: 'bg-violet-100' },
      { id: 'late_over', category: 'late', label: '遅超勤', shortLabel: '遅超', time: '8:30〜19:00', icon: 'cloud-moon', color: 'text-purple-500', bg: 'bg-purple-50' },
      { id: 'night_miyama', category: 'night', label: 'みやま', shortLabel: '夜み', time: '夜勤→明け', icon: 'moon', color: 'text-blue-500', bg: 'bg-blue-100' },
      { id: 'night_miyakita', category: 'night', label: 'みやま北', shortLabel: '夜北', time: '夜勤→明け', icon: 'moon', color: 'text-fuchsia-500', bg: 'bg-fuchsia-100' },
      { id: 'night_miyama_off', category: 'night_off', label: 'みやま', shortLabel: '夜み', time: '明け→休み', icon: 'moon-star', color: 'text-blue-500', bg: 'bg-blue-100' },
      { id: 'night_miyakita_off', category: 'night_off', label: 'みやま北', shortLabel: '夜北', time: '明け→休み', icon: 'moon-star', color: 'text-fuchsia-500', bg: 'bg-fuchsia-100' },
      { id: 'off', category: 'other', label: 'お休み', shortLabel: '休', time: 'リフレッシュ♪', icon: 'heart', color: 'text-rose-500', bg: 'bg-rose-100' },
      { id: 'paid_leave', category: 'other', label: '有給', shortLabel: '有休', time: 'お出かけ♪', icon: 'luggage', color: 'text-pink-500', bg: 'bg-pink-100' },
      { id: 'nursing', category: 'other', label: '看護休暇', shortLabel: '看護', time: 'お大事に', icon: 'baby', color: 'text-teal-500', bg: 'bg-teal-100' },
      { id: 'clear', category: 'other', label: 'けす', shortLabel: '', time: '', icon: 'eraser', color: 'text-gray-400', bg: 'bg-gray-100' },
      { id: 'ake', category: 'hidden', label: '明け', shortLabel: '明け', time: '9:00〜', icon: 'sunrise', color: 'text-cyan-600', bg: 'bg-cyan-100', hidden: true }
    ];

    const categories = [
      { id: 'early', icon: 'sun', label: '早・日' },
      { id: 'late', icon: 'sunset', label: '遅番' },
      { id: 'night', icon: 'moon-star', label: '夜勤' },
      { id: 'other', icon: 'heart', label: '休・他' }
    ];

    let state = { themeKey: 'pink', today: new Date(), currentDate: null, shifts: {}, activeCategory: 'early', selectedStampId: 'early1' };
    state.currentDate = new Date(state.today.getFullYear(), state.today.getMonth(), 1);

    const SAVE_KEY = 'cuteShiftApp_saveData';
    function loadData() {
      try {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) { const parsed = JSON.parse(saved); if (parsed.shifts) state.shifts = parsed.shifts; if (parsed.themeKey) state.themeKey = parsed.themeKey; }
      } catch(e) { console.error("データ読み込みエラー", e); }
    }
    function saveData() {
      try { localStorage.setItem(SAVE_KEY, JSON.stringify({ shifts: state.shifts, themeKey: state.themeKey })); }
      catch(e) { console.error("データ保存エラー", e); }
    }

    function init() { loadData(); renderThemeButtons(); renderTabs(); updateApp(); }

    function updateApp() { applyTheme(); renderHeader(); renderTodayPanel(); renderCalendar(); updateTabsUI(); renderStamps(); renderCurrentStampInfo(); lucide.createIcons(); }

    function applyTheme() {
      const t = themes[state.themeKey];
      document.getElementById('app').className = `app-container ${t.bg}`;
      document.getElementById('header').className = `px-4 pt-8 pb-6 rounded-b-[32px] flex flex-col items-center transition-colors duration-500 ${t.header} relative z-0`;
      document.querySelectorAll('.theme-dot').forEach(el => { const isSelected = state.themeKey === el.dataset.theme; el.className = `theme-dot w-5 h-5 rounded-full shadow-sm border-2 ${themes[el.dataset.theme].dot} ${isSelected ? 'border-white scale-125' : 'border-transparent opacity-50'}`; });
      document.getElementById('palette').className = `absolute bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md pb-4 pt-3 rounded-t-[24px] border-t ${t.border} shadow-[0_-10px_20px_rgba(0,0,0,0.08)] z-20`;
    }

    function renderThemeButtons() {
      const container = document.getElementById('theme-container'); container.innerHTML = '';
      for (const [key, t] of Object.entries(themes)) {
        const btn = document.createElement('button'); btn.dataset.theme = key;
        btn.onclick = () => { state.themeKey = key; saveData(); updateApp(); };
        container.appendChild(btn);
      }
    }

    function renderHeader() { document.getElementById('month-title').textContent = `${state.currentDate.getFullYear()}年 ${state.currentDate.getMonth() + 1}月`; }

    function changeMonth(delta) { state.currentDate = new Date(state.currentDate.getFullYear(), state.currentDate.getMonth() + delta, 1); if (navigator.vibrate) navigator.vibrate(30); updateApp(); }

    function renderTodayPanel() {
      const t = themes[state.themeKey]; const todayKey = `${state.today.getFullYear()}-${state.today.getMonth()}-${state.today.getDate()}`;
      const shift = shiftTypes.find(s => s.id === state.shifts[todayKey]); const panel = document.getElementById('today-panel-content');
      panel.className = `bg-white/90 backdrop-blur-md rounded-[20px] p-3 flex items-center justify-between shadow-[0_4px_15px_rgba(0,0,0,0.05)] border ${t.border}`;
      let html = `<div class="flex flex-col"><div class="flex items-center gap-1.5"><span class="text-[11px] font-bold ${t.muted}">今日 (${state.today.getMonth()+1}/${state.today.getDate()}) のシフト</span></div>`;
      if (shift) { html += `<div class="flex items-end gap-2 mt-1"><span class="text-[15px] font-[900] ${shift.color}">${shift.label}</span><span class="text-[12px] font-bold ${t.text} opacity-80 mb-[2px]">${shift.time}</span></div></div><div class="relative w-11 h-11 rounded-[14px] ${shift.bg} flex items-center justify-center bounce-in"><i data-lucide="${shift.icon}" class="w-6 h-6 ${shift.color}"></i>${shift.badge ? `<span class="absolute -bottom-1 -right-1 text-[10px] font-black ${shift.color} bg-white/90 rounded-full w-4 h-4 flex items-center justify-center leading-none shadow-sm">${shift.badge}</span>` : ''}</div>`; }
      else { html += `<div class="mt-1"><span class="text-[13px] font-bold ${t.text} opacity-50">まだ入力されてないよ 💤</span></div></div><div class="w-11 h-11 rounded-[14px] bg-gray-50 border border-gray-100 flex items-center justify-center"><i data-lucide="coffee" class="w-5 h-5 text-gray-300"></i></div>`; }
      panel.innerHTML = html;
    }

    function renderCalendar() {
      const t = themes[state.themeKey]; const year = state.currentDate.getFullYear(); const month = state.currentDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay(); const daysInMonth = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
      for (let i = 0; i < firstDay; i++) { const div = document.createElement('div'); div.className = "aspect-[4/5] bg-transparent"; grid.appendChild(div); }
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${year}-${month}-${day}`; const shift = shiftTypes.find(s => s.id === state.shifts[dateKey]);
        const isToday = (year === state.today.getFullYear() && month === state.today.getMonth() && day === state.today.getDate());
        const cell = document.createElement('div');
        cell.className = `aspect-[4/5] rounded-xl flex flex-col items-center justify-start pt-1 relative select-none transition-all duration-100 active-scale ${t.card} border cursor-pointer hover:shadow-md ${isToday ? `${t.todayRing} border-transparent bg-white shadow-sm` : t.border}`;
        cell.onclick = () => {
          if (state.selectedStampId === 'clear') { delete state.shifts[dateKey]; }
          else {
            state.shifts[dateKey] = state.selectedStampId;
            if (state.selectedStampId.startsWith('night_')) {
              const d = new Date(year, month, day); d.setDate(d.getDate() + 1);
              state.shifts[`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`] = 'ake';
              if (state.selectedStampId.endsWith('_off')) { d.setDate(d.getDate() + 1); state.shifts[`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`] = 'off'; }
            }
          }
          saveData(); if (navigator.vibrate) navigator.vibrate(30); updateApp();
        };
        cell.innerHTML = `<span class="text-[13px] font-bold z-10 transition-all pointer-events-none ${isToday ? t.dot + ' text-white w-6 h-6 rounded-full flex items-center justify-center -mt-1 shadow-sm' : t.text}">${day}</span>${shift ? `<div class="absolute bottom-1 w-[90%] h-[65%] rounded-lg ${shift.bg} flex flex-col items-center justify-center bounce-in gap-0.5 pointer-events-none"><div class="relative"><i data-lucide="${shift.icon}" class="w-4 h-4 opacity-80 ${shift.color}"></i>${shift.badge ? `<span class="absolute -bottom-1.5 -right-2 text-[9px] font-black ${shift.color} leading-none bg-white/90 rounded-full w-4 h-4 flex items-center justify-center shadow-sm">${shift.badge}</span>` : ''}</div><span class="text-[10px] font-[900] leading-none ${shift.color} tracking-tighter mt-[1px]">${shift.shortLabel}</span></div>` : ''}`;
        grid.appendChild(cell);
      }
    }

    function renderTabs() {
      const container = document.getElementById('tabs'); container.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button'); btn.dataset.id = cat.id;
        btn.innerHTML = `<i data-lucide="${cat.icon}" class="w-3.5 h-3.5 pointer-events-none"></i><span class="pointer-events-none">${cat.label}</span>`;
        btn.onclick = () => {
          state.activeCategory = cat.id;
          const first = shiftTypes.find(s => s.category === cat.id || (cat.id === 'night' && (s.category === 'night' || s.category === 'night_off')));
          if (first) state.selectedStampId = first.id;
          if (navigator.vibrate) navigator.vibrate(20);
          updateApp();
        };
        container.appendChild(btn);
      });
    }

    function updateTabsUI() {
      const t = themes[state.themeKey];
      document.querySelectorAll('#tabs button').forEach(btn => {
        if(btn.dataset.id === state.activeCategory) { btn.className = `flex items-center gap-1 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all whitespace-nowrap snap-center ${t.activeBg} ${t.text} shadow-sm scale-105`; }
        else { btn.className = `flex items-center gap-1 px-3 py-1.5 rounded-full text-[11px] font-bold transition-all whitespace-nowrap snap-center bg-gray-50 text-gray-400 hover:bg-gray-100`; }
      });
    }

    function renderStamps() {
      const container = document.getElementById('stamp-list'); container.innerHTML = '';
      const t = themes[state.themeKey];
      const createStampBtn = (s) => {
        const isSelected = state.selectedStampId === s.id;
        const btn = document.createElement('button');
        btn.className = `stamp-btn flex flex-col items-center gap-1 min-w-[50px] ${isSelected ? 'selected' : ''}`;
        btn.onclick = () => { state.selectedStampId = s.id; if (navigator.vibrate) navigator.vibrate(20); updateApp(); };
        btn.innerHTML = `<div class="relative w-10 h-10 rounded-[14px] flex items-center justify-center shadow-sm pointer-events-none ${isSelected ? s.bg : 'bg-white border border-gray-100'}"><i data-lucide="${s.icon}" class="w-5 h-5 ${isSelected ? s.color : 'text-gray-400'}"></i>${s.badge ? `<span class="absolute -bottom-1 -right-1 text-[9px] font-black ${isSelected ? s.color : 'text-gray-400'} bg-white/90 rounded-full w-3.5 h-3.5 flex items-center justify-center leading-none shadow-sm">${s.badge}</span>` : ''}</div><span class="text-[9px] font-bold whitespace-nowrap pointer-events-none ${isSelected ? s.color : t.muted}">${s.label}</span>`;
        return btn;
      };
      if (state.activeCategory === 'night') {
        const wrapper = document.createElement('div'); wrapper.className = 'flex justify-center gap-3 px-1';
        const box1 = document.createElement('div'); box1.className = 'flex flex-col items-center bg-gray-50/80 p-1.5 rounded-[20px] border border-gray-100 shadow-sm';
        box1.innerHTML = `<div class="text-[10px] font-bold text-gray-500 mb-1 flex items-center gap-1"><i data-lucide="sunrise" class="w-3 h-3 pointer-events-none"></i>明けまで</div>`;
        const flex1 = document.createElement('div'); flex1.className = 'flex gap-1.5';
        shiftTypes.filter(s => s.category === 'night').forEach(s => flex1.appendChild(createStampBtn(s)));
        box1.appendChild(flex1);
        const box2 = document.createElement('div'); box2.className = 'flex flex-col items-center bg-gray-50/80 p-1.5 rounded-[20px] border border-gray-100 shadow-sm';
        box2.innerHTML = `<div class="text-[10px] font-bold text-gray-500 mb-1 flex items-center gap-1"><i data-lucide="bed-double" class="w-3 h-3 pointer-events-none"></i>休みセット</div>`;
        const flex2 = document.createElement('div'); flex2.className = 'flex gap-1.5';
        shiftTypes.filter(s => s.category === 'night_off').forEach(s => flex2.appendChild(createStampBtn(s)));
        box2.appendChild(flex2);
        wrapper.appendChild(box1); wrapper.appendChild(box2); container.appendChild(wrapper);
      } else {
        const wrapper = document.createElement('div'); wrapper.className = 'flex flex-wrap justify-center px-2 gap-2';
        shiftTypes.filter(s => s.category === state.activeCategory).forEach(s => wrapper.appendChild(createStampBtn(s)));
        container.appendChild(wrapper);
      }
    }

    function renderCurrentStampInfo() {
      const stamp = shiftTypes.find(s => s.id === state.selectedStampId) || shiftTypes[0]; const t = themes[state.themeKey];
      document.getElementById('current-stamp-info').innerHTML = `<div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full ${t.activeBg} ${t.text} text-[11px] font-bold"><i data-lucide="${stamp.icon}" class="w-3.5 h-3.5 ${stamp.color}"></i><span>${stamp.label}</span>${stamp.time ? `<span class="opacity-50">|</span><span>${stamp.time}</span>` : ''}</div>`;
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</head>
<body>
  <div id="app" class="app-container bg-pink-50">
    <div id="theme-container" class="absolute top-4 right-4 flex gap-2 z-20"></div>
    <div id="header">
      <div class="flex items-center gap-2 text-xl font-black mb-3 tracking-wide"><i data-lucide="calendar-heart" class="w-7 h-7"></i>シフトカレンダー</div>
      <div class="flex items-center justify-between w-full px-4 mt-1">
        <button onclick="changeMonth(-1)" class="p-2 rounded-full hover:bg-white/40 active-scale transition-all bg-white/30 shadow-sm"><i data-lucide="chevron-left" class="w-5 h-5 pointer-events-none"></i></button>
        <h2 id="month-title" class="text-lg font-bold"></h2>
        <button onclick="changeMonth(1)" class="p-2 rounded-full hover:bg-white/40 active-scale transition-all bg-white/30 shadow-sm"><i data-lucide="chevron-right" class="w-5 h-5 pointer-events-none"></i></button>
      </div>
    </div>
    <div class="px-4 mt-[-20px] mb-2 relative z-10"><div id="today-panel-content"></div></div>
    <div class="flex-1 overflow-y-auto px-2 pt-1 pb-48 hide-scrollbar">
      <div class="grid grid-cols-7 gap-1 mb-1" id="weekdays">
        <div class="text-center text-[10px] font-bold text-rose-400">日</div><div class="text-center text-[10px] font-bold text-gray-400">月</div><div class="text-center text-[10px] font-bold text-gray-400">火</div><div class="text-center text-[10px] font-bold text-gray-400">水</div><div class="text-center text-[10px] font-bold text-gray-400">木</div><div class="text-center text-[10px] font-bold text-gray-400">金</div><div class="text-center text-[10px] font-bold text-sky-400">土</div>
      </div>
      <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
    </div>
    <div id="palette">
      <div id="tabs" class="flex overflow-x-auto hide-scrollbar gap-2 mb-2.5 px-3 w-full snap-x justify-center"></div>
      <div id="current-stamp-info" class="text-center mb-2 px-4"></div>
      <div id="stamp-list" class="w-full"></div>
    </div>
  </div>
</body>
</html>
